<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAG 工作流编排</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0b1120; color: #e2e8f0; line-height: 1.5; overflow: hidden;
    display: flex; flex-direction: column; height: 100vh;
  }
  /* 顶栏 */
  header {
    background: #111a2e; padding: 10px 18px; display: flex;
    align-items: center; justify-content: space-between;
    border-bottom: 1px solid #1f2a44; flex-shrink: 0; z-index: 20;
  }
  header h1 { font-size: 16px; font-weight: 600; cursor: pointer; }
  header .desc { color: #94a3b8; font-size: 12px; margin-top: 1px; }
  .toolbar { display: flex; gap: 8px; align-items: center; }
  button {
    background: #2563eb; color: #fff; border: none; padding: 7px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px; transition: .15s;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #334155; cursor: not-allowed; color: #64748b; }
  button.ghost { background: #1e293b; border: 1px solid #334155; }
  button.ghost:hover { background: #334155; }
  button.danger { background: #b91c1c; }
  button.danger:hover { background: #991b1b; }
  button.small { padding: 4px 10px; font-size: 12px; }
  .status-pill { padding: 3px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .row { display: flex; align-items: center; gap: 8px; }
  .muted { color: #64748b; font-size: 12px; }

  /* 主体：画布 + 侧栏 */
  .main { flex: 1; display: flex; min-height: 0; }
  .canvas-wrap { position: relative; flex: 1; overflow: hidden; background:
    radial-gradient(circle, #1e293b 1px, transparent 1px) 0 0 / 22px 22px,
    #0b1120; cursor: grab; }
  .canvas-wrap.panning { cursor: grabbing; }
  .viewport { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
  .edges { position: absolute; left: 0; top: 0; width: 1px; height: 1px; overflow: visible; pointer-events: none; }
  .edge-path { fill: none; stroke: #475569; stroke-width: 2; pointer-events: stroke; cursor: pointer; }
  .edge-path:hover { stroke: #f87171; stroke-width: 3; }
  .edge-path.active { stroke: #22c55e; }
  .edge-temp { fill: none; stroke: #38bdf8; stroke-width: 2; stroke-dasharray: 5 4; pointer-events: none; }

  /* 节点卡片 */
  .node {
    position: absolute; width: 200px; background: #15203a;
    border: 1.5px solid #334155; border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,.35); user-select: none;
  }
  .node.selected { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,.35), 0 4px 14px rgba(0,0,0,.4); }
  .node.disabled { opacity: .5; }
  .node .nhead {
    display: flex; align-items: center; gap: 7px; padding: 9px 11px;
    cursor: move; border-bottom: 1px solid #243049; border-radius: 10px 10px 0 0;
  }
  .node .ntype-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot-shell { background: #22c55e; }
  .dot-golang { background: #22d3ee; }
  .dot-python { background: #fbbf24; }
  .node .ntitle { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node .nbody { padding: 8px 11px; font-size: 11px; color: #94a3b8; }
  .node .ncmd { font-family: ui-monospace, Menlo, monospace; color: #64748b; word-break: break-all;
    max-height: 34px; overflow: hidden; }
  .node .nfoot { display: flex; align-items: center; justify-content: space-between; padding: 7px 11px; border-top: 1px solid #243049; }
  .node .nstatus { font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 4px; }

  /* 节点边框随状态变化 */
  .node.st-running { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.4), 0 4px 14px rgba(0,0,0,.4); }
  .node.st-success { border-color: #22c55e; }
  .node.st-failed  { border-color: #ef4444; }
  .node.st-skipped { border-color: #57534e; }
  .badge-pending { background: #334155; color: #cbd5e1; }
  .badge-running { background: #1d4ed8; color: #dbeafe; }
  .badge-success { background: #166534; color: #dcfce7; }
  .badge-failed  { background: #b91c1c; color: #fee2e2; }
  .badge-skipped { background: #44403c; color: #e7e5e4; }

  /* 端口 */
  .port { position: absolute; width: 14px; height: 14px; border-radius: 50%;
    background: #0b1120; border: 2px solid #64748b; top: 14px; }
  .port:hover { border-color: #38bdf8; background: #38bdf8; }
  .port.in { left: -8px; }
  .port.out { right: -8px; cursor: crosshair; }
  .port.out:hover { transform: scale(1.15); }

  /* 开关 */
  .switch { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink:0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: #475569; border-radius: 999px; transition: .2s; }
  .slider:before { content: ""; position: absolute; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: #22c55e; }
  input:checked + .slider:before { transform: translateX(16px); }

  /* 缩放控制 */
  .zoom-ctl { position: absolute; left: 14px; bottom: 14px; display: flex; gap: 6px; align-items: center;
    background: #111a2e; border: 1px solid #1f2a44; border-radius: 8px; padding: 5px 8px; z-index: 10; }
  .zoom-ctl button { background: #1e293b; padding: 3px 9px; font-size: 14px; }
  .hint-tip { position: absolute; right: 14px; top: 14px; background: #111a2e; border: 1px solid #1f2a44;
    border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #94a3b8; z-index: 10; max-width: 230px; }

  /* 侧栏 */
  .sidebar { width: 340px; background: #0d1426; border-left: 1px solid #1f2a44; display: flex;
    flex-direction: column; flex-shrink: 0; }
  .tabs { display: flex; border-bottom: 1px solid #1f2a44; }
  .tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; cursor: pointer; color: #94a3b8; }
  .tab.active { color: #e2e8f0; border-bottom: 2px solid #2563eb; }
  .panel { flex: 1; overflow-y: auto; padding: 14px; }
  .panel.hidden { display: none; }
  .log-node { border: 1px solid #243049; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #111a2e; }
  .log-node .lh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .log-node .lt { font-weight: 600; font-size: 13px; }
  pre { background: #060b18; padding: 7px; border-radius: 6px; font-size: 11px; overflow-x: auto;
    margin-top: 5px; color: #cbd5e1; max-height: 160px; }
  .hist-item { padding: 8px 10px; border: 1px solid #243049; border-radius: 6px; margin-bottom: 7px;
    font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; }
  .hist-item:hover { border-color: #2563eb; }
  .hist-item.active { border-color: #2563eb; background: #111a2e; }

  /* 编辑面板（行内字段） */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; background: #060b18; border: 1px solid #334155; color: #e2e8f0;
    padding: 7px 9px; border-radius: 6px; font-size: 13px; font-family: inherit;
  }
  .field textarea { min-height: 64px; resize: vertical; font-family: ui-monospace, Menlo, monospace; }
  .field .hint { font-size: 11px; color: #64748b; margin-top: 3px; }
  .deps-box { display: flex; flex-wrap: wrap; gap: 6px; }
  .dep-chip { display: inline-flex; align-items: center; gap: 4px; background: #060b18; border: 1px solid #334155;
    padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .dep-chip.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
  .panel-empty { color: #64748b; font-size: 13px; text-align: center; margin-top: 40px; }
</style>
</head>
<body>
<header>
  <div>
    <h1 id="dag-name" title="点击编辑名称/描述">DAG 工作流</h1>
    <div class="desc" id="dag-desc"></div>
  </div>
  <div class="toolbar">
    <span class="status-pill badge-pending" id="global-status">就绪</span>
    <button id="btn-run">▶ 运行</button>
    <button class="ghost" id="btn-add">＋ 节点</button>
    <button class="ghost" id="btn-layout">⊞ 自动布局</button>
    <button class="ghost small" id="btn-fit">适应视图</button>
    <label class="row muted" style="margin-left:4px"><input type="checkbox" id="auto-refresh" checked> 自动刷新</label>
  </div>
</header>

<div class="main">
  <div class="canvas-wrap" id="canvas">
    <div class="viewport" id="viewport">
      <svg class="edges" id="edges"></svg>
      <!-- 节点动态插入 -->
    </div>
    <div class="hint-tip">
      拖拽节点头部移动 · 拖空白处平移 · 滚轮缩放<br>
      从右侧 ● 拖到另一节点左侧 ● 建立依赖<br>
      点击连线可删除依赖
    </div>
    <div class="zoom-ctl">
      <button id="zoom-out">－</button>
      <span class="muted" id="zoom-level" style="min-width:42px;text-align:center">100%</span>
      <button id="zoom-in">＋</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" data-tab="inspector">检视</div>
      <div class="tab" data-tab="logs">运行日志</div>
      <div class="tab" data-tab="history">历史</div>
    </div>
    <div class="panel" id="panel-inspector">
      <div class="panel-empty" id="inspector-empty">选中一个节点查看 / 编辑，或点击「＋ 节点」新增</div>
      <div id="inspector-form" style="display:none"></div>
    </div>
    <div class="panel hidden" id="panel-logs"><div class="panel-empty">暂无执行记录</div></div>
    <div class="panel hidden" id="panel-history"><div class="panel-empty">暂无历史</div></div>
  </div>
</div>

<script>
/* ============ API ============ */
const api = {
  dag:    () => fetch('/api/dag').then(r => r.json()),
  run:    () => fetch('/api/run', { method: 'POST' }).then(r => r.json()),
  runs:   () => fetch('/api/runs').then(r => r.json()),
  runById:(id) => fetch('/api/run/' + id).then(r => r.ok ? r.json() : null),
  latest: () => fetch('/api/run/latest').then(r => r.ok ? r.json() : null),
  enable: (id, enabled) => post('/api/node/enable', { id, enabled }),
  saveNode: (node) => post('/api/node/save', node),
  deleteNode: (id) => post('/api/node/delete', { id }),
  savePos: (id, x, y) => post('/api/node/position', { id, x, y }),
  saveMeta: (name, description) => post('/api/dag/meta', { name, description }),
};
function post(url, body) {
  return fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }).then(r => r.json());
}
function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function statusText(s) { return ({pending:'等待',running:'执行中',success:'成功',failed:'失败',skipped:'跳过'})[s] || '等待'; }

/* ============ 状态 ============ */
const NODE_W = 200;
const PORT_Y = 21;           // 端口相对节点顶部的 y
let nodes = [];              // 当前节点数组
let nodeById = {};
let statusMap = {};          // id -> status
let selectedId = null;
let viewRunId = 'latest';    // 当前查看的运行
const view = { x: 60, y: 40, k: 1 };  // 平移/缩放

const canvas = document.getElementById('canvas');
const viewport = document.getElementById('viewport');
const edgesSvg = document.getElementById('edges');

function applyView() {
  viewport.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.k})`;
  document.getElementById('zoom-level').textContent = Math.round(view.k * 100) + '%';
}
function toCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: (clientX - r.left - view.x) / view.k, y: (clientY - r.top - view.y) / view.k };
}

/* ============ 加载与渲染 ============ */
async function loadDAG() {
  const info = await api.dag();
  nodes = info.nodes || [];
  nodeById = {};
  nodes.forEach(n => nodeById[n.id] = n);

  document.getElementById('dag-name').textContent = info.name || 'DAG 工作流';
  document.getElementById('dag-desc').textContent = info.description || '';
  const gs = document.getElementById('global-status');
  gs.textContent = info.running ? '执行中…' : '就绪';
  gs.className = 'status-pill ' + (info.running ? 'badge-running' : 'badge-pending');
  document.getElementById('btn-run').disabled = info.running;

  autoLayoutMissing();
  render();
}

// 为缺少坐标(x=0,y=0)的节点按依赖层级自动排布
function autoLayoutMissing(force) {
  const need = force ? nodes : nodes.filter(n => !n.x && !n.y);
  if (!need.length) return;
  const depth = {};
  const calc = (id, stack) => {
    if (depth[id] != null) return depth[id];
    if (stack.includes(id)) return 0;
    const n = nodeById[id];
    if (!n || !n.deps || !n.deps.length) return depth[id] = 0;
    let d = 0;
    n.deps.forEach(dep => { d = Math.max(d, calc(dep, [...stack, id]) + 1); });
    return depth[id] = d;
  };
  nodes.forEach(n => calc(n.id, []));
  const layerCount = {};
  const targets = new Set(need.map(n => n.id));
  nodes.forEach(n => {
    if (!targets.has(n.id)) return;
    const d = depth[n.id] || 0;
    const idx = layerCount[d] || 0;
    layerCount[d] = idx + 1;
    n.x = 80 + d * 270;
    n.y = 60 + idx * 150;
    api.savePos(n.id, n.x, n.y);
  });
}

function nodeStatusClass(id) {
  const s = statusMap[id];
  return s ? ' st-' + s : '';
}

function render() {
  // 移除旧节点（保留 svg）
  viewport.querySelectorAll('.node').forEach(e => e.remove());

  nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (n.id === selectedId ? ' selected' : '') + (n.enabled ? '' : ' disabled') + nodeStatusClass(n.id);
    el.style.left = (n.x || 0) + 'px';
    el.style.top = (n.y || 0) + 'px';
    el.dataset.id = n.id;
    const st = statusMap[n.id] || 'pending';
    el.innerHTML = `
      <div class="port in" data-port="in" data-id="${n.id}"></div>
      <div class="port out" data-port="out" data-id="${n.id}"></div>
      <div class="nhead" data-drag="${n.id}">
        <span class="ntype-dot dot-${n.type}"></span>
        <span class="ntitle">${escapeHtml(n.name || n.id)}</span>
      </div>
      <div class="nbody">
        <div class="ncmd">${escapeHtml((n.command || n.script || '（空）').slice(0, 80))}</div>
      </div>
      <div class="nfoot">
        <span class="nstatus badge-${st}">${statusText(st)}</span>
        <label class="switch" title="启用 / 禁用">
          <input type="checkbox" ${n.enabled ? 'checked' : ''} data-enable="${n.id}">
          <span class="slider"></span>
        </label>
      </div>`;
    viewport.appendChild(el);
  });

  bindNodeEvents();
  drawEdges();
}

function portPos(node, side) {
  const x = side === 'out' ? (node.x || 0) + NODE_W : (node.x || 0);
  return { x, y: (node.y || 0) + PORT_Y };
}

function drawEdges() {
  let paths = '';
  nodes.forEach(n => {
    (n.deps || []).forEach(dep => {
      const src = nodeById[dep], dst = n;
      if (!src || !dst) return;
      const p1 = portPos(src, 'out'), p2 = portPos(dst, 'in');
      const dx = Math.max(50, Math.abs(p2.x - p1.x) * 0.5);
      const d = `M ${p1.x} ${p1.y} C ${p1.x + dx} ${p1.y}, ${p2.x - dx} ${p2.y}, ${p2.x} ${p2.y}`;
      const active = statusMap[dep] === 'success' ? ' active' : '';
      paths += `<path class="edge-path${active}" d="${d}" data-from="${dep}" data-to="${n.id}"></path>`;
    });
  });
  edgesSvg.innerHTML = paths;
  edgesSvg.querySelectorAll('.edge-path').forEach(p => {
    p.addEventListener('click', async (e) => {
      e.stopPropagation();
      const from = p.dataset.from, to = p.dataset.to;
      if (!confirm(`删除依赖：${from} → ${to} ？`)) return;
      const node = nodeById[to];
      const newDeps = (node.deps || []).filter(d => d !== from);
      const res = await api.saveNode({ ...node, deps: newDeps });
      if (res && res.error) { alert(res.error); return; }
      await loadDAG();
    });
  });
}

/* ============ 节点交互（拖拽 / 端口连线 / 开关 / 选中） ============ */
function bindNodeEvents() {
  // 选中 + 拖拽
  viewport.querySelectorAll('.node').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      if (e.target.dataset.port) return;          // 端口单独处理
      if (e.target.closest('.switch')) return;     // 开关
      selectNode(el.dataset.id);
    });
    const handle = el.querySelector('[data-drag]');
    handle.addEventListener('mousedown', (e) => startNodeDrag(e, el.dataset.id));
  });
  // 开关
  viewport.querySelectorAll('input[data-enable]').forEach(cb => {
    cb.addEventListener('change', async (e) => {
      e.stopPropagation();
      const res = await api.enable(e.target.dataset.enable, e.target.checked);
      if (res && res.error) alert(res.error);
      loadDAG();
    });
  });
  // 端口连线
  viewport.querySelectorAll('.port.out').forEach(p => {
    p.addEventListener('mousedown', (e) => startConnect(e, p.dataset.id));
  });
}

let drag = null;
function startNodeDrag(e, id) {
  e.stopPropagation();
  const n = nodeById[id];
  const start = toCanvas(e.clientX, e.clientY);
  drag = { id, ox: n.x || 0, oy: n.y || 0, sx: start.x, sy: start.y, moved: false };
  document.addEventListener('mousemove', onNodeDrag);
  document.addEventListener('mouseup', endNodeDrag);
}
function onNodeDrag(e) {
  if (!drag) return;
  const p = toCanvas(e.clientX, e.clientY);
  const n = nodeById[drag.id];
  n.x = Math.round(drag.ox + (p.x - drag.sx));
  n.y = Math.round(drag.oy + (p.y - drag.sy));
  drag.moved = true;
  const el = viewport.querySelector(`.node[data-id="${cssEsc(drag.id)}"]`);
  if (el) { el.style.left = n.x + 'px'; el.style.top = n.y + 'px'; }
  drawEdges();
}
async function endNodeDrag() {
  document.removeEventListener('mousemove', onNodeDrag);
  document.removeEventListener('mouseup', endNodeDrag);
  if (drag && drag.moved) {
    const n = nodeById[drag.id];
    api.savePos(drag.id, n.x, n.y);
  }
  drag = null;
}

let conn = null;
function startConnect(e, fromId) {
  e.stopPropagation();
  conn = { from: fromId };
  document.addEventListener('mousemove', onConnect);
  document.addEventListener('mouseup', endConnect);
}
function onConnect(e) {
  if (!conn) return;
  const src = nodeById[conn.from];
  const p1 = portPos(src, 'out');
  const p2 = toCanvas(e.clientX, e.clientY);
  const dx = Math.max(50, Math.abs(p2.x - p1.x) * 0.5);
  const d = `M ${p1.x} ${p1.y} C ${p1.x + dx} ${p1.y}, ${p2.x - dx} ${p2.y}, ${p2.x} ${p2.y}`;
  let temp = edgesSvg.querySelector('.edge-temp');
  if (!temp) {
    temp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    temp.setAttribute('class', 'edge-temp');
    edgesSvg.appendChild(temp);
  }
  temp.setAttribute('d', d);
}
async function endConnect(e) {
  document.removeEventListener('mousemove', onConnect);
  document.removeEventListener('mouseup', endConnect);
  const tmp = edgesSvg.querySelector('.edge-temp');
  if (tmp) tmp.remove();
  if (!conn) return;
  const target = document.elementFromPoint(e.clientX, e.clientY);
  const fromId = conn.from;
  conn = null;
  if (!target) return;
  const portIn = target.closest('.port.in');
  const nodeEl = target.closest('.node');
  const toId = portIn ? portIn.dataset.id : (nodeEl ? nodeEl.dataset.id : null);
  if (!toId || toId === fromId) return;
  const node = nodeById[toId];
  const deps = node.deps || [];
  if (deps.includes(fromId)) return;
  const res = await api.saveNode({ ...node, deps: [...deps, fromId] });
  if (res && res.error) { alert('建立依赖失败：' + res.error); return; }
  await loadDAG();
}
function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/"/g,'\\"'); }

/* ============ 画布平移 / 缩放 ============ */
let pan = null;
canvas.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node') || e.target.closest('.zoom-ctl') || e.target.closest('.edge-path')) return;
  pan = { sx: e.clientX, sy: e.clientY, ox: view.x, oy: view.y };
  canvas.classList.add('panning');
  if (e.target === canvas || e.target === viewport || e.target === edgesSvg) selectNode(null);
});
document.addEventListener('mousemove', (e) => {
  if (!pan) return;
  view.x = pan.ox + (e.clientX - pan.sx);
  view.y = pan.oy + (e.clientY - pan.sy);
  applyView();
});
document.addEventListener('mouseup', () => { pan = null; canvas.classList.remove('panning'); });
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const k0 = view.k;
  const k = Math.min(2.5, Math.max(0.25, k0 * (e.deltaY < 0 ? 1.1 : 0.9)));
  // 以鼠标为锚点缩放
  view.x = mx - (mx - view.x) * (k / k0);
  view.y = my - (my - view.y) * (k / k0);
  view.k = k;
  applyView();
}, { passive: false });

function zoomBy(f) {
  const r = canvas.getBoundingClientRect();
  const mx = r.width / 2, my = r.height / 2;
  const k0 = view.k;
  const k = Math.min(2.5, Math.max(0.25, k0 * f));
  view.x = mx - (mx - view.x) * (k / k0);
  view.y = my - (my - view.y) * (k / k0);
  view.k = k; applyView();
}
document.getElementById('zoom-in').onclick = () => zoomBy(1.15);
document.getElementById('zoom-out').onclick = () => zoomBy(1/1.15);

function fitView() {
  if (!nodes.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x || 0); minY = Math.min(minY, n.y || 0);
    maxX = Math.max(maxX, (n.x || 0) + NODE_W); maxY = Math.max(maxY, (n.y || 0) + 120);
  });
  const r = canvas.getBoundingClientRect();
  const pad = 60;
  const k = Math.min(1.2, (r.width - pad * 2) / (maxX - minX || 1), (r.height - pad * 2) / (maxY - minY || 1));
  view.k = Math.max(0.25, k);
  view.x = pad - minX * view.k + (r.width - pad * 2 - (maxX - minX) * view.k) / 2;
  view.y = pad - minY * view.k;
  applyView();
}
document.getElementById('btn-fit').onclick = fitView;
document.getElementById('btn-layout').onclick = async () => {
  if (!confirm('按依赖层级重新排布所有节点？')) return;
  autoLayoutMissing(true);
  render();
  setTimeout(fitView, 50);
};

/* ============ 侧栏：检视/编辑 ============ */
function selectNode(id) {
  selectedId = id;
  viewport.querySelectorAll('.node').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
  renderInspector();
  if (id) switchTab('inspector');
}

function renderInspector() {
  const empty = document.getElementById('inspector-empty');
  const form = document.getElementById('inspector-form');
  if (!selectedId || !nodeById[selectedId]) {
    empty.style.display = ''; form.style.display = 'none'; return;
  }
  empty.style.display = 'none'; form.style.display = '';
  const n = nodeById[selectedId];
  const others = nodes.filter(x => x.id !== n.id);
  const depChips = others.length
    ? others.map(o => `<span class="dep-chip ${(n.deps||[]).includes(o.id)?'active':''}" data-dep="${o.id}">${escapeHtml(o.name||o.id)}</span>`).join('')
    : '<span class="muted">暂无其它节点</span>';
  form.innerHTML = `
    <div class="field"><label>节点 ID</label><input id="f-id" value="${escapeHtml(n.id)}" disabled></div>
    <div class="field"><label>名称</label><input id="f-name" value="${escapeHtml(n.name||'')}"></div>
    <div class="field"><label>类型</label>
      <select id="f-type">
        <option value="shell" ${n.type==='shell'?'selected':''}>shell（命令行）</option>
        <option value="python" ${n.type==='python'?'selected':''}>python（脚本）</option>
        <option value="golang" ${n.type==='golang'?'selected':''}>golang（go run）</option>
      </select></div>
    <div class="field"><label>依赖（上游节点全部完成后执行）</label>
      <div class="deps-box" id="f-deps">${depChips}</div>
      <div class="hint">下游可读环境变量 <code>$DAG_UPSTREAM_OUTPUT</code> 或 <code>$DAG_DEP_&lt;ID大写&gt;_OUTPUT</code></div>
    </div>
    <div class="field"><label>命令 / 脚本路径</label><input id="f-command" value="${escapeHtml(n.command||'')}" placeholder="shell 命令、py/go 路径"></div>
    <div class="field"><label>内联脚本（可选）</label><textarea id="f-script" placeholder="直接粘贴脚本内容">${escapeHtml(n.script||'')}</textarea></div>
    <div class="field"><label>参数（每行一个）</label><textarea id="f-args">${escapeHtml((n.args||[]).join('\n'))}</textarea></div>
    <div class="field"><label>工作目录</label><input id="f-workdir" value="${escapeHtml(n.workdir||'')}"></div>
    <div class="field"><label>环境变量（每行 KEY=VALUE）</label><textarea id="f-env">${escapeHtml((n.env||[]).join('\n'))}</textarea></div>
    <div class="field"><label>超时（秒，0 不限）</label><input id="f-timeout" type="number" min="0" value="${n.timeout_sec||0}"></div>
    <div class="row" style="justify-content:space-between;margin-top:6px">
      <button class="danger small" id="f-del">删除节点</button>
      <button id="f-save">保存</button>
    </div>`;

  form.querySelectorAll('.dep-chip[data-dep]').forEach(c =>
    c.addEventListener('click', () => c.classList.toggle('active')));
  document.getElementById('f-save').onclick = saveCurrent;
  document.getElementById('f-del').onclick = deleteCurrent;
}

function linesToArr(t){ return t.split('\n').map(s=>s.trim()).filter(Boolean); }

async function saveCurrent() {
  const n = nodeById[selectedId];
  const deps = Array.from(document.querySelectorAll('#f-deps .dep-chip.active')).map(c => c.dataset.dep);
  const node = {
    ...n,
    name: document.getElementById('f-name').value.trim(),
    type: document.getElementById('f-type').value,
    deps,
    command: document.getElementById('f-command').value.trim(),
    script: document.getElementById('f-script').value,
    args: linesToArr(document.getElementById('f-args').value),
    workdir: document.getElementById('f-workdir').value.trim(),
    env: linesToArr(document.getElementById('f-env').value),
    timeout_sec: parseInt(document.getElementById('f-timeout').value, 10) || 0,
  };
  const res = await api.saveNode(node);
  if (res && res.error) { alert('保存失败：' + res.error); return; }
  await loadDAG();
}
async function deleteCurrent() {
  if (!confirm(`确认删除节点「${selectedId}」？`)) return;
  const res = await api.deleteNode(selectedId);
  if (res && res.error) { alert(res.error); return; }
  selectedId = null;
  await loadDAG();
}

/* 新增节点 */
document.getElementById('btn-add').onclick = async () => {
  const id = prompt('新节点 ID（唯一标识，如 task_a）：');
  if (!id) return;
  if (nodeById[id.trim()]) { alert('ID 已存在'); return; }
  // 放置在当前视图中心
  const r = canvas.getBoundingClientRect();
  const center = toCanvas(r.left + r.width/2, r.top + r.height/2);
  const node = { id: id.trim(), name: id.trim(), type: 'shell', deps: [], command: 'echo hello',
    script: '', args: [], workdir: '', env: [], timeout_sec: 0,
    x: Math.round(center.x - NODE_W/2), y: Math.round(center.y - 40) };
  const res = await api.saveNode(node);
  if (res && res.error) { alert(res.error); return; }
  await loadDAG();
  selectNode(node.id);
};

/* DAG 名称 / 描述 */
document.getElementById('dag-name').addEventListener('click', async () => {
  const name = prompt('工作流名称：', document.getElementById('dag-name').textContent);
  if (name === null) return;
  const description = prompt('描述：', document.getElementById('dag-desc').textContent);
  if (description === null) return;
  const res = await api.saveMeta(name.trim(), description.trim());
  if (res && res.error) { alert(res.error); return; }
  loadDAG();
});

/* ============ 运行 / 日志 / 历史 ============ */
document.getElementById('btn-run').onclick = async () => {
  const res = await api.run();
  if (res.error) { alert(res.error); return; }
  viewRunId = 'latest';
  switchTab('logs');
  setTimeout(refreshRun, 300);
};

async function refreshRun() {
  const run = viewRunId === 'latest' ? await api.latest() : await api.runById(viewRunId);
  const box = document.getElementById('panel-logs');
  if (!run) { statusMap = {}; box.innerHTML = '<div class="panel-empty">暂无执行记录</div>'; render(); return; }
  statusMap = {};
  const results = Object.values(run.nodes || {});
  results.forEach(nr => statusMap[nr.id] = nr.status);
  let html = `<div class="muted" style="margin-bottom:10px">运行 ${escapeHtml(run.id)} · ${run.finished ? '已完成' : '进行中…'}</div>`;
  results.sort((a,b) => (a.name||a.id).localeCompare(b.name||b.id));
  results.forEach(nr => {
    html += `<div class="log-node">
      <div class="lh"><span class="lt">${escapeHtml(nr.name || nr.id)}</span>
        <span class="nstatus badge-${nr.status}">${statusText(nr.status)}</span></div>
      ${nr.stdout ? `<pre>${escapeHtml(nr.stdout)}</pre>` : ''}
      ${nr.stderr ? `<pre style="color:#fca5a5">${escapeHtml(nr.stderr)}</pre>` : ''}
      ${nr.error ? `<div class="muted" style="color:#fca5a5">错误：${escapeHtml(nr.error)}</div>` : ''}
    </div>`;
  });
  box.innerHTML = html;
  render(); // 更新节点状态着色
}

async function refreshHistory() {
  const runs = await api.runs();
  const box = document.getElementById('panel-history');
  if (!runs.length) { box.innerHTML = '<div class="panel-empty">暂无历史</div>'; return; }
  box.innerHTML = runs.map(r =>
    `<div class="hist-item ${r.id===viewRunId?'active':''}" data-run="${escapeHtml(r.id)}">
      <span>${escapeHtml(r.id)}</span>
      <span class="muted">${r.finished ? '已完成' : '进行中'}</span>
    </div>`).join('');
  box.querySelectorAll('.hist-item').forEach(el =>
    el.addEventListener('click', () => { viewRunId = el.dataset.run; switchTab('logs'); refreshRun(); refreshHistory(); }));
}

/* ============ Tab 切换 ============ */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('panel-inspector').classList.toggle('hidden', name !== 'inspector');
  document.getElementById('panel-logs').classList.toggle('hidden', name !== 'logs');
  document.getElementById('panel-history').classList.toggle('hidden', name !== 'history');
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

/* ============ 刷新循环 ============ */
async function refreshAll() {
  await loadDAG();
  await refreshRun();
  await refreshHistory();
}
setInterval(() => {
  if (document.getElementById('auto-refresh').checked && !drag && !conn && !pan) {
    loadDAG().then(refreshRun);
  }
}, 1800);

/* ============ 初始化 ============ */
applyView();
(async () => {
  await refreshAll();
  setTimeout(fitView, 80);
})();
</script>
</body>
